<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Climfra | 2026 Carbon Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Your existing CSS variables and reset */
        :root {
            --bg: #030704;
            --card: rgba(18, 24, 20, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #22c55e;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(34, 197, 94, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(22, 163, 74, 0.1) 0%, transparent 40%);
        }

        .hero-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 3rem;
            border-radius: 32px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            background: rgba(34, 197, 94, 0.1);
            color: var(--accent);
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 { font-size: 3.5rem; letter-spacing: -2px; margin-bottom: 1rem; }
        p { color: var(--text-dim); line-height: 1.6; }

    </style>
</head>
<body>

    <div class="hero-card">
        <span class="badge">V2.0 Intelligence Active</span>
        <h1>Climfra</h1>
        <p>Decentralized carbon infrastructure for the 2026 ecological economy. High-fidelity tracking. Zero-latency offsets.</p>
    </div>

</body>
</html>
