<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Climfra 2026 - Carbon Intelligence Platform">
    <title>Climfra | 2026 Carbon Intelligence</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* ══ DESIGN SYSTEM ══ */
        :root {
            --bg: #050A07;
            --card: rgba(18, 28, 20, 0.75);
            --border: rgba(255, 255, 255, 0.07);
            --accent: #22c55e;
            --accent2: #16a34a;
            --accent-glow: rgba(34, 197, 94, 0.22);
            --text: #f0fdf4;
            --dim: #6b7280;
            --r-xl: 26px;
            --r-lg: 18px;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        /* ══ CORE STYLES ══ */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(34, 197, 94, 0.15) 0%, transparent 45%),
                radial-gradient(circle at 100% 100%, rgba(22, 163, 74, 0.1) 0%, transparent 45%);
        }

        /* ══ LAYOUT ══ */
        .app-container { height: 100%; display: flex; flex-direction: column; padding-top: var(--safe-top); }
        
        .screen { 
            display: none; 
            flex-direction: column; 
            height: 100%; 
            padding: 20px;
            overflow-y: auto;
            animation: fadeIn 0.4s ease;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ══ UI COMPONENTS ══ */
        .hero-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: var(--r-xl);
            margin-bottom: 20px;
            text-align: center;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        
        .stat-box {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: var(--r-lg);
        }

        .stat-val { font-family: 'JetBrains Mono'; font-weight: 700; color: var(--accent); font-size: 1.2rem; }
        .stat-label { font-size: 0.75rem; color: var(--dim); text-transform: uppercase; margin-top: 4px; }

        .btn-primary {
            background: var(--accent);
            color: #050A07;
            border: none;
            padding: 16px;
            border-radius: var(--r-lg);
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
        }

        /* ══ NAVIGATION DOCK ══ */
        .nav-dock {
            position: fixed;
            bottom: calc(20px + var(--safe-bottom));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(8, 16, 10, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 6px;
            border-radius: 40px;
            display: flex;
            gap: 5px;
            z-index: 1000;
        }

        .nav-item {
            padding: 10px 20px;
            border-radius: 30px;
            color: var(--dim);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-item.active {
            background: var(--accent);
            color: #000;
        }

        /* Hide scrollbars */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="screen-dash" class="screen active">
            <div class="hero-card">
                <h2 style="font-weight: 800; font-size: 2rem; margin-bottom: 8px;">Climfra Intelligence</h2>
                <p style="color: var(--dim); font-size: 0.9rem;">2026 Carbon Ledger Active</p>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-val">4.28 <span style="font-size: 0.7rem;">tCO2e</span></div>
                    <div class="stat-label">Total Offset</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val">98.2</div>
                    <div class="stat-label">ESG Score</div>
                </div>
            </div>

            <button class="btn-primary" onclick="alert('Syncing with Global Carbon Index...')">SYNC INFRASTRUCTURE</button>
        </div>

        <div id="screen-market" class="screen">
            <h3 style="margin-bottom: 20px;">Carbon Credits Market</h3>
            <div class="stat-box" style="margin-bottom: 10px;">
                <div style="display: flex; justify-content: space-between;">
                    <span>Amazonia Reforest</span>
                    <span style="color: var(--accent)">$12.40</span>
                </div>
            </div>
            <div class="stat-box">
                <div style="display: flex; justify-content: space-between;">
                    <span>Nordic Wind Array</span>
                    <span style="color: var(--accent)">$09.15</span>
                </div>
            </div>
        </div>
    </div>

    <nav class="nav-dock">
        <div class="nav-item active" onclick="showScreen('dash', this)">Overview</div>
        <div class="nav-item" onclick="showScreen('market', this)">Market</div>
        <div class="nav-item" onclick="showScreen('dash', this)">Settings</div>
    </nav>

    <script>
        function showScreen(screenId, el) {
            // Update Navigation UI
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');

            // Switch Screens
            document.querySelectorAll('.screen').forEach(screen => screen.classList.remove('active'));
            document.getElementById('screen-' + screenId).classList.add('active');
            
            // Haptic feedback simulation
            if (window.navigator.vibrate) window.navigator.vibrate(5);
        }

        // Initialize state
        console.log("Climfra 2026 Core Initialized...");
    </script>
</body>
</html>
