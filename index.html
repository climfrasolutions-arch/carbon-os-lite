<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Climfra 2026 - Carbon Intelligence Platform Prototype">
    <title>Climfra | 2026 Carbon Intelligence</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* ══ DESIGN SYSTEM ══ */
        :root {
            --bg: #050A07;
            --card: rgba(18, 28, 20, 0.75);
            --border: rgba(255, 255, 255, 0.07);
            --accent: #22c55e;
            --accent2: #16a34a;
            --accent-glow: rgba(34, 197, 94, 0.22);
            --warn: #f59e0b;
            --danger: #ef4444;
            --blue: #38bdf8;
            --text: #f0fdf4;
            --dim: #6b7280;
            --glass: rgba(255, 255, 255, 0.03);
            --r-xl: 26px;
            --r-lg: 18px;
            --r-md: 13px;
            --r-sm: 9px;
        }

        /* ══ CORE STYLES ══ */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            background-image: 
                radial-gradient(ellipse at 10% 10%, rgba(34, 197, 94, .13) 0%, transparent 55%),
                radial-gradient(ellipse at 90% 90%, rgba(22, 163, 74, .10) 0%, transparent 55%);
        }

        /* ══ NAVIGATION & SCREENS ══ */
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; opacity: 0; transition: opacity .3s ease; }
        .screen.on { display: flex; opacity: 1; }
        .page { display: none; }
        .page.on { display: block; }
        .scroll-main { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 110px; -webkit-overflow-scrolling: touch; }
        .scroll-main::-webkit-scrollbar { display: none; }

        /* ══ UI COMPONENTS ══ */
        .card { background: var(--card); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: var(--r-xl); padding: 20px; }
        .card-sm { border-radius: var(--r-lg); padding: 14px; }
        .card-accent { border-color: rgba(34, 197, 94, .28); background: linear-gradient(145deg, rgba(34, 197, 94, .09), rgba(0, 0, 0, 0)); }
        
        .inp { width: 100%; background: rgba(255, 255, 255, .04); border: 1px solid var(--border); border-radius: var(--r-md); padding: 13px 15px; color: var(--text); font-size: 15px; font-family: 'Outfit', sans-serif; outline: none; transition: 0.2s; }
        .inp:focus { border-color: var(--accent); background: rgba(34, 197, 94, .05); box-shadow: 0 0 0 3px var(--accent-glow); }

        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 13px 22px; border-radius: var(--r-lg); font-weight: 600; border: none; cursor: pointer; transition: 0.2s; font-family: inherit; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-ghost { background: var(--glass); border: 1px solid var(--border); color: var(--text); }
        .btn-full { width: 100%; }

        .nav-dock { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); background: rgba(8, 16, 10, .9); backdrop-filter: blur(24px); border: 1px solid var(--border); padding: 5px; border-radius: 40px; display: flex; gap: 3px; z-index: 200; box-shadow: 0 8px 32px rgba(0,0,0,.55); }
        .nav-item { padding: 9px 14px; border-radius: 32px; color: var(--dim); display: flex; align-items: center; gap: 5px; font-weight: 600; font-size: 12px; cursor: pointer; border: none; background: transparent; }
        .nav-item.on { background: var(--accent); color: #000; }

        .bento { display: grid; grid-template-columns: repeat(2, 1fr); gap: 11px; padding: 14px; }
        .span2 { grid-column: span 2; }
        .pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-family: 'JetBrains Mono'; font-size: 10px; font-weight: 500; text-transform: uppercase; }
        .pill-g { background: rgba(34, 197, 94, .15); color: #22c55e; }
        .pill-y { background: rgba(245, 158, 11, .15); color: #f59e0b; }
        .pill-r { background: rgba(239, 68, 68, .15); color: #ef4444; }

        /* ══ SPECIAL ANIMATIONS ══ */
        @keyframes bagWave { 0%, 100% { transform: rotate(-8deg); } 50% { transform: rotate(8deg) translateY(-5px); } }
        .bag-wave { animation: bagWave 1.4s ease-in-out infinite; display: inline-block; transform-origin: bottom center; }
        .shimmer-btn { background: linear-gradient(90deg, var(--accent), #4ade80, var(--accent)); background-size: 200% 100%; animation: shimmer 2.5s linear infinite; color: #000; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        /* Remaining Styles from Original Block (Shortened for Preview) */
        .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.72); backdrop-filter: blur(8px); z-index: 500; display: none; align-items: flex-end; justify-content: center; }
        .modal-backdrop.on { display: flex; }
        .modal { width: 100%; max-width: 480px; background: #0b160d; border-radius: var(--r-xl) var(--r-xl) 0 0; padding: 22px; max-height: 90vh; overflow-y: auto; }
        .toast { position: fixed; top: 18px; left: 50%; transform: translateX(-50%) translateY(-70px); background: #0d1810; border: 1px solid var(--accent); padding: 11px 18px; border-radius: var(--r-md); font-size: 13px; z-index: 999; transition: 0.3s; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .score-ring { position: relative; width: 126px; height: 126px; margin: 0 auto; }
        .score-ring svg { transform: rotate(-90deg); }
        .hmap-cell { aspect-ratio: 1; border-radius: 4px; cursor: pointer; }
    </style>
</head>
