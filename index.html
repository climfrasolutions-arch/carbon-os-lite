<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoInvest | Carbon Market Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <nav class="border-b border-gray-800 p-4 flex justify-between items-center bg-gray-900 sticky top-0 z-10">
        <div class="flex items-center gap-2">
            <i data-lucide="leaf" class="text-green-500"></i>
            <span class="text-xl font-bold tracking-tight">EcoInvest</span>
        </div>
        <div class="flex gap-4">
            <div class="text-right">
                <p class="text-xs text-gray-400">Buying Power</p>
                <p class="font-mono text-green-400" id="balance">$25,000.00</p>
            </div>
        </div>
    </nav>

    <main class="p-4 max-w-md mx-auto pb-24">
        
        <section class="mb-8">
            <h2 class="text-gray-400 text-sm mb-1">Global Carbon Credit (EU ETS)</h2>
            <div class="flex items-baseline gap-2">
                <span class="text-3xl font-bold">$84.52</span>
                <span class="text-green-500 text-sm font-medium">+2.4% Today</span>
            </div>
            <div class="h-32 w-full bg-gray-800 mt-4 rounded-lg flex items-end gap-1 p-2">
                <div class="bg-green-500/20 w-full h-1/2 rounded-t"></div>
                <div class="bg-green-500/30 w-full h-3/4 rounded-t"></div>
                <div class="bg-green-500/40 w-full h-2/3 rounded-t"></div>
                <div class="bg-green-500/60 w-full h-5/6 rounded-t"></div>
                <div class="bg-green-500 w-full h-full rounded-t"></div>
            </div>
        </section>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700">
                <p class="text-xs text-gray-400">Your Credits</p>
                <p class="text-lg font-bold" id="user-credits">12.5 tCO2e</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700">
                <p class="text-xs text-gray-400">Impact Score</p>
                <p class="text-lg font-bold text-blue-400">A+</p>
            </div>
        </div>

        <section class="bg-gray-800 p-6 rounded-2xl shadow-xl">
            <div class="flex mb-6 bg-gray-900 p-1 rounded-lg">
                <button onclick="setMode('buy')" id="buy-tab" class="flex-1 py-2 rounded-md bg-green-600 font-bold">Buy</button>
                <button onclick="setMode('sell')" id="sell-tab" class="flex-1 py-2 rounded-md font-bold">Sell</button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-xs text-gray-400 uppercase">Quantity (Metric Tons)</label>
                    <input type="number" id="qty" value="1" class="w-full bg-transparent border-b border-gray-600 py-2 text-2xl outline-none focus:border-green-500 transition">
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-gray-400">Estimated Total:</span>
                    <span id="total-price" class="font-mono">$84.52</span>
                </div>
                <button onclick="executeTrade()" id="trade-btn" class="w-full bg-green-600 hover:bg-green-500 py-4 rounded-xl font-bold text-lg shadow-lg active:scale-95 transition-all">
                    Confirm Purchase
                </button>
            </div>
        </section>
    </main>

    <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-6 z-50">
        <div class="bg-gray-800 p-8 rounded-3xl text-center max-w-xs w-full">
            <div class="bg-green-500/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="check-circle" class="text-green-500 w-10 h-10"></i>
            </div>
            <h3 class="text-xl font-bold mb-2">Trade Successful!</h3>
            <p class="text-gray-400 text-sm mb-6">Your carbon portfolio has been updated.</p>
            <button onclick="closeModal()" class="w-full py-3 bg-gray-700 rounded-xl font-bold">Back to Market</button>
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // State Management
        let balance = 25000.00;
        let credits = 12.5;
        let pricePerTon = 84.52;
        let mode = 'buy';

        const qtyInput = document.getElementById('qty');
        const totalDisplay = document.getElementById('total-price');

        // Logic
        qtyInput.addEventListener('input', () => {
            const total = (qtyInput.value * pricePerTon).toFixed(2);
            totalDisplay.innerText = `$${total}`;
        });

        function setMode(newMode) {
            mode = newMode;
            const buyTab = document.getElementById('buy-tab');
            const sellTab = document.getElementById('sell-tab');
            const tradeBtn = document.getElementById('trade-btn');

            if (mode === 'buy') {
                buyTab.classList.add('bg-green-600');
                sellTab.classList.remove('bg-red-600');
                tradeBtn.innerText = 'Confirm Purchase';
                tradeBtn.classList.replace('bg-red-600', 'bg-green-600');
            } else {
                sellTab.classList.add('bg-red-600');
                buyTab.classList.remove('bg-green-600');
                tradeBtn.innerText = 'Confirm Sale';
                tradeBtn.classList.replace('bg-green-600', 'bg-red-600');
            }
        }

        function executeTrade() {
            const qty = parseFloat(qtyInput.value);
            const cost = qty * pricePerTon;

            if (mode === 'buy') {
                if (cost > balance) return alert("Insufficient funds!");
                balance -= cost;
                credits += qty;
            } else {
                if (qty > credits) return alert("Not enough credits!");
                balance += cost;
                credits -= qty;
            }

            updateUI();
            document.getElementById('modal').classList.remove('hidden');
        }

        function updateUI() {
            document.getElementById('balance').innerText = `$${balance.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('user-credits').innerText = `${credits.toFixed(1)} tCO2e`;
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }
    </script>
</body>
</html>
